<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Commercial Lead Board</title>
<meta name="robots" content="noindex" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1d21;
    --chrome: #21252b;
    --chrome-line: #34393f;
    --paper: #e9ebee;
    --card: #ffffff;
    --line: #ccd1d6;
    --muted: #666d75;
    --orange: #ff6a1a;

    --c-new: #3568d4;
    --c-ready: #b8860b;
    --c-sched: #ff6a1a;
    --c-parts: #0f8b8d;
    --c-svc: #6a4fb3;
    --c-fu: #c2447a;
    --c-done: #1f8a4c;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--paper);
    color: var(--ink);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
  }
  header {
    background: var(--chrome);
    color: #fff;
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 3px solid var(--orange);
  }
  header h1 {
    font-family: 'Oswald', sans-serif;
    text-transform: uppercase;
    letter-spacing: 0.03em;
    font-size: 19px;
    margin: 0;
  }
  header .status {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: #a9afb6;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  header button {
    background: transparent;
    border: 1px solid var(--chrome-line);
    color: #fff;
    font-family: 'Inter', sans-serif;
    font-size: 12.5px;
    padding: 6px 12px;
    border-radius: 3px;
    cursor: pointer;
  }
  header button:hover { border-color: var(--orange); }
  header a.header-link {
    background: transparent;
    border: 1px solid var(--chrome-line);
    color: #fff;
    text-decoration: none;
    font-family: 'Inter', sans-serif;
    font-size: 12.5px;
    padding: 6px 12px;
    border-radius: 3px;
  }
  header a.header-link:hover { border-color: var(--orange); }

  /* ROI strip */
  #roi {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 1px;
    background: var(--chrome-line);
    border-bottom: 1px solid var(--chrome-line);
  }
  .stat {
    background: var(--chrome);
    color: #fff;
    padding: 12px 16px;
  }
  .stat .stat-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10.5px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: #9ba1a8;
    margin-bottom: 4px;
  }
  .stat .stat-value {
    font-family: 'Oswald', sans-serif;
    font-size: 21px;
    font-weight: 600;
  }
  .stat.highlight .stat-value { color: var(--orange); }

  /* Sidebar + content layout */
  #layout {
    display: flex;
    align-items: flex-start;
    min-height: calc(100vh - 140px);
  }
  #sidebar {
    width: 230px;
    flex-shrink: 0;
    background: var(--chrome);
    min-height: calc(100vh - 140px);
    padding: 14px 0;
  }
  .stage-link {
    display: flex;
    align-items: center;
    gap: 10px;
    width: 100%;
    padding: 11px 16px;
    background: transparent;
    border: none;
    border-left: 3px solid transparent;
    color: #c7cbd1;
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 500;
    text-align: left;
    cursor: pointer;
  }
  .stage-link:hover { background: rgba(255,255,255,0.05); color: #fff; }
  .stage-link.active {
    background: rgba(255,255,255,0.08);
    border-left-color: var(--orange);
    color: #fff;
  }
  .stage-link .dot {
    width: 9px; height: 9px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .stage-link .label { flex: 1; }
  .stage-link .badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    background: rgba(255,255,255,0.14);
    padding: 1px 7px;
    border-radius: 10px;
    color: #fff;
  }
  .stage-link.active .badge { background: var(--orange); }
  .sidebar-divider {
    height: 1px;
    background: var(--chrome-line);
    margin: 8px 16px;
  }

  #content {
    flex: 1;
    min-width: 0;
    padding: 20px 24px;
  }
  .section { margin-bottom: 26px; }
  .section-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 9px 14px;
    border-radius: 3px 3px 0 0;
    color: #fff;
    font-family: 'Oswald', sans-serif;
    text-transform: uppercase;
    font-size: 12.5px;
    letter-spacing: 0.03em;
  }
  .section-head .count {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    background: rgba(255,255,255,0.22);
    padding: 1px 7px;
    border-radius: 10px;
  }
  .section-body {
    background: #dfe2e6;
    border-radius: 0 0 3px 3px;
    padding: 12px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 12px;
  }
  .section-empty {
    grid-column: 1 / -1;
    font-size: 12px;
    color: #8a9097;
    text-align: center;
    padding: 20px 8px;
  }

  .tag {
    background: var(--card);
    border: 1px dashed var(--line);
    border-radius: 3px;
    position: relative;
    padding: 16px 12px 12px;
  }
  .tag::before {
    content: "";
    position: absolute;
    top: -6px; left: 50%;
    transform: translateX(-50%);
    width: 12px; height: 12px;
    background: var(--paper);
    border: 1px dashed var(--line);
    border-radius: 50%;
  }
  .tag .ticket {
    position: absolute;
    top: 8px; right: 10px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10.5px;
    color: #9aa0a6;
  }
  .tag h3 {
    font-family: 'Oswald', sans-serif;
    font-size: 15px;
    margin: 4px 24px 2px 0;
    line-height: 1.2;
  }
  .tag .contact { font-size: 12.5px; color: #4b5157; margin-bottom: 2px; }
  .tag .contact a { color: inherit; }
  .tag .meta {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    margin-top: 6px;
    line-height: 1.5;
  }
  .tag .ro {
    display: inline-block;
    margin-top: 6px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    font-weight: 600;
    color: #1f8a4c;
    background: #e5f4ea;
    padding: 2px 7px;
    border-radius: 3px;
  }
  .tag button.advance {
    margin-top: 10px;
    width: 100%;
    padding: 8px 10px;
    border: none;
    border-radius: 3px;
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: 12.5px;
    cursor: pointer;
    color: #fff;
  }

  .overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(26,29,33,0.55);
    align-items: center;
    justify-content: center;
    padding: 16px;
    z-index: 10;
  }
  .modal {
    background: #fff;
    border-radius: 5px;
    width: 100%;
    max-width: 400px;
    padding: 22px 22px 18px;
  }
  .modal h2 {
    font-family: 'Oswald', sans-serif;
    text-transform: uppercase;
    font-size: 16px;
    margin: 0 0 4px;
  }
  .modal .sub { font-size: 12.5px; color: var(--muted); margin: 0 0 16px; }
  .modal label {
    display: block;
    font-size: 11.5px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: #565c63;
    margin: 12px 0 5px;
  }
  .modal input, .modal textarea {
    width: 100%;
    padding: 9px 10px;
    border: 1px solid var(--line);
    border-radius: 3px;
    font-family: 'Inter', sans-serif;
    font-size: 14px;
  }
  .modal textarea { resize: vertical; min-height: 54px; }
  .modal .row { display: flex; gap: 18px; margin-top: 18px; }
  .modal .row button {
    flex: 1;
    padding: 10px;
    border-radius: 3px;
    border: none;
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: 13.5px;
    cursor: pointer;
  }
  .modal .cancel { background: #eceef0; color: var(--ink); }
  .modal .confirm { background: var(--orange); color: #fff; }

  #blocked {
    display: none;
    max-width: 460px;
    margin: 14vh auto;
    text-align: center;
    padding: 0 20px;
  }
  #blocked h2 { font-family: 'Oswald', sans-serif; text-transform: uppercase; }
  #blocked p { color: var(--muted); font-size: 14px; line-height: 1.6; }

  @media (max-width: 900px) {
    #roi { grid-template-columns: repeat(3, 1fr); }
    #layout { flex-direction: column; }
    #sidebar {
      width: 100%;
      min-height: 0;
      display: flex;
      overflow-x: auto;
      padding: 8px;
      gap: 4px;
    }
    .stage-link {
      width: auto;
      white-space: nowrap;
      border-left: none;
      border-bottom: 3px solid transparent;
      border-radius: 3px;
    }
    .stage-link.active { border-left-color: transparent; border-bottom-color: var(--orange); }
    .sidebar-divider { display: none; }
  }
</style>
</head>
<body>

<div id="blocked">
  <h2>Dashboard unavailable here</h2>
  <p>This board is only reachable from the dealership network. Connect to the shop Wi-Fi or a dealership computer and reload this page.</p>
</div>

<div id="app" style="display:none">
  <header>
    <h1>Commercial Lead Board</h1>
    <div class="status">
      <span id="lastUpdated">—</span>
      <a class="header-link" href="settings.html">Settings</a>
      <a class="header-link" href="users.html">Manage Users</a>
      <button id="refreshBtn">Refresh</button>
    </div>
  </header>

  <div id="roi">
    <div class="stat">
      <div class="stat-label">Leads Captured</div>
      <div class="stat-value" id="statLeads">0</div>
    </div>
    <div class="stat">
      <div class="stat-label">Serviced</div>
      <div class="stat-value" id="statServiced">0</div>
    </div>
    <div class="stat">
      <div class="stat-label">RO Revenue</div>
      <div class="stat-value" id="statRevenue">$0</div>
    </div>
    <div class="stat">
      <div class="stat-label">Program Cost</div>
      <div class="stat-value" id="statCost">$0</div>
    </div>
    <div class="stat highlight">
      <div class="stat-label">ROI</div>
      <div class="stat-value" id="statROI">—</div>
    </div>
    <div class="stat">
      <div class="stat-label">Cost / Redemption</div>
      <div class="stat-value" id="statCostPerRedemption">$0</div>
    </div>
  </div>

  <div id="layout">
    <nav id="sidebar"></nav>
    <main id="content"></main>
  </div>
</div>

<div class="overlay" id="overlay">
  <div class="modal" id="modal"></div>
</div>

<script>
  const API_URL = "https://dealership-lead-tracker-api.whitakerm56.workers.dev/api";

  const STATUS_META = {
    new:                   { label: "New Leads",         color: "var(--c-new)"  },
    ready_for_advisor:     { label: "Ready for Advisor",  color: "var(--c-ready)"},
    appointment_scheduled: { label: "Appointment Set",    color: "var(--c-sched)"},
    parts_ordered:         { label: "Parts Prep",         color: "var(--c-parts)"},
    service_complete:      { label: "Service Complete",   color: "var(--c-svc)"  },
    follow_up_assigned:    { label: "Follow-Up",          color: "var(--c-fu)"   },
    follow_up_complete:    { label: "Closed",             color: "var(--c-done)" },
  };
  const ORDER = Object.keys(STATUS_META);
  const NEXT = {
    new: "ready_for_advisor",
    ready_for_advisor: "appointment_scheduled",
    appointment_scheduled: "parts_ordered",
    parts_ordered: "service_complete",
    service_complete: "follow_up_assigned",
    follow_up_assigned: "follow_up_complete",
  };
  const ADVANCE_LABEL = {
    new: "Assign to Advisor",
    ready_for_advisor: "Log Appointment",
    appointment_scheduled: "Mark Parts Ordered",
    parts_ordered: "Close RO & Complete",
    service_complete: "Assign Follow-Up",
    follow_up_assigned: "Mark Follow-Up Done",
  };

  let leads = [];
  let users = [];
  let oilChangeCost = 35;
  let activeStatus = "all";
  let pollTimer = null;

  async function loadAll() {
    try {
      const [leadsRes, settingsRes, usersRes] = await Promise.all([
        fetch(`${API_URL}/leads`),
        fetch(`${API_URL}/settings`),
        fetch(`${API_URL}/users`),
      ]);

      if (leadsRes.status === 403 || settingsRes.status === 403 || usersRes.status === 403) {
        document.getElementById("blocked").style.display = "block";
        document.getElementById("app").style.display = "none";
        clearInterval(pollTimer);
        return;
      }
      if (!leadsRes.ok) throw new Error("Failed to load leads");

      leads = await leadsRes.json();
      if (usersRes.ok) users = await usersRes.json();
      if (settingsRes.ok) {
        const settings = await settingsRes.json();
        oilChangeCost = Number(settings.oil_change_cost) || 0;
      }

      document.getElementById("blocked").style.display = "none";
      document.getElementById("app").style.display = "block";
      renderStats();
      renderSidebar();
      renderContent();
      document.getElementById("lastUpdated").textContent =
        "Updated " + new Date().toLocaleTimeString();
    } catch (err) {
      console.error(err);
    }
  }

  function renderStats() {
    const serviced = leads.filter((l) => l.ro_value !== null && l.ro_value !== undefined);
    const revenue = serviced.reduce((sum, l) => sum + Number(l.ro_value || 0), 0);
    const cost = serviced.length * oilChangeCost;
    const roi = cost > 0 ? ((revenue - cost) / cost) * 100 : null;

    document.getElementById("statLeads").textContent = leads.length;
    document.getElementById("statServiced").textContent = serviced.length;
    document.getElementById("statRevenue").textContent = money(revenue);
    document.getElementById("statCost").textContent = money(cost);
    document.getElementById("statROI").textContent = roi === null ? "—" : `${roi >= 0 ? "+" : ""}${roi.toFixed(0)}%`;
    document.getElementById("statCostPerRedemption").textContent = money(oilChangeCost);
  }

  function renderSidebar() {
    const sidebar = document.getElementById("sidebar");
    sidebar.innerHTML = "";

    const allBtn = document.createElement("button");
    allBtn.className = "stage-link" + (activeStatus === "all" ? " active" : "");
    allBtn.innerHTML = `<span class="dot" style="background:#8a9097"></span><span class="label">All Leads</span><span class="badge">${leads.length}</span>`;
    allBtn.addEventListener("click", () => { activeStatus = "all"; renderSidebar(); renderContent(); });
    sidebar.appendChild(allBtn);

    const divider = document.createElement("div");
    divider.className = "sidebar-divider";
    sidebar.appendChild(divider);

    for (const status of ORDER) {
      const meta = STATUS_META[status];
      const count = leads.filter((l) => l.status === status).length;
      const btn = document.createElement("button");
      btn.className = "stage-link" + (activeStatus === status ? " active" : "");
      btn.innerHTML = `<span class="dot" style="background:${meta.color}"></span><span class="label">${meta.label}</span><span class="badge">${count}</span>`;
      btn.addEventListener("click", () => { activeStatus = status; renderSidebar(); renderContent(); });
      sidebar.appendChild(btn);
    }
  }

  function renderContent() {
    const content = document.getElementById("content");
    content.innerHTML = "";
    const statuses = activeStatus === "all" ? ORDER : [activeStatus];

    for (const status of statuses) {
      const meta = STATUS_META[status];
      const items = leads.filter((l) => l.status === status);

      const section = document.createElement("div");
      section.className = "section";
      section.innerHTML = `
        <div class="section-head" style="background:${meta.color}">
          <span>${meta.label}</span>
          <span class="count">${items.length}</span>
        </div>
        <div class="section-body" id="body-${status}"></div>
      `;
      content.appendChild(section);

      const body = section.querySelector(".section-body");
      if (items.length === 0) {
        body.innerHTML = `<div class="section-empty">No leads here</div>`;
        continue;
      }
      for (const lead of items) body.appendChild(renderCard(lead));
    }
  }

  function renderCard(lead) {
    const el = document.createElement("div");
    el.className = "tag";
    const meta = STATUS_META[lead.status];
    const ticketNo = String(lead.ticket_no ?? "").padStart(4, "0");

    let extra = "";
    if (lead.vehicle_info) {
      extra += `<div class="meta">${escapeHtml(lead.vehicle_info)}</div>`;
    }
    if (lead.vin) {
      extra += `<div class="meta">VIN ${escapeHtml(lead.vin)}</div>`;
    }
    if (lead.requested_appointment_date) {
      extra += `<div class="meta">Requested: ${new Date(lead.requested_appointment_date).toLocaleString([], {dateStyle:"medium", timeStyle:"short"})}</div>`;
    }
    if (lead.appointment_date) {
      extra += `<div class="meta">Scheduled: ${new Date(lead.appointment_date).toLocaleString([], {dateStyle:"medium", timeStyle:"short"})}</div>`;
    }
    if (lead.ro_value !== null && lead.ro_value !== undefined) {
      extra += `<div class="ro">RO ${money(Number(lead.ro_value))}</div>`;
    }
    if (lead.followup_assignee_name) {
      extra += `<div class="meta">Follow-up: ${escapeHtml(lead.followup_assignee_name)}</div>`;
    }

    let btn = "";
    if (NEXT[lead.status]) {
      btn = `<button class="advance" style="background:${meta.color}" data-id="${lead.id}">${ADVANCE_LABEL[lead.status]}</button>`;
    }

    el.innerHTML = `
      <span class="ticket">#${ticketNo}</span>
      <h3>${escapeHtml(lead.company_name)}</h3>
      <div class="contact">${escapeHtml(lead.contact_name)} &middot; <a href="tel:${escapeHtml(lead.phone)}">${escapeHtml(lead.phone)}</a></div>
      <div class="contact">${escapeHtml(lead.email)}</div>
      ${extra}
      ${btn}
    `;

    const advanceBtn = el.querySelector(".advance");
    if (advanceBtn) advanceBtn.addEventListener("click", () => openModal(lead));
    return el;
  }

  function openModal(lead) {
    const next = NEXT[lead.status];
    const overlay = document.getElementById("overlay");
    const modal = document.getElementById("modal");

    let fields = "";
    if (next === "ready_for_advisor") {
      fields = `
        <label for="f_assigned_by">Your Name (Sales Manager)</label>
        <input id="f_assigned_by" required />
      `;
    } else if (next === "appointment_scheduled") {
      fields = `
        <label for="f_vehicle_info">Vehicle (year / make / model)</label>
        <input id="f_vehicle_info" value="${lead.vehicle_info ? escapeHtml(lead.vehicle_info) : ""}" required />
        <label for="f_appointment_date">Appointment Date &amp; Time</label>
        <input id="f_appointment_date" type="datetime-local" value="${lead.requested_appointment_date ? toDatetimeLocalValue(lead.requested_appointment_date) : ""}" required />
        ${lead.requested_appointment_date ? `<p class="sub" style="margin-top:6px">Customer requested this time — adjust if it needs to change.</p>` : ""}
        <label for="f_advisor_notes">Notes for Parts (optional)</label>
        <textarea id="f_advisor_notes"></textarea>
        <label for="f_scheduled_by">Your Name (Service Advisor)</label>
        <input id="f_scheduled_by" required />
      `;
    } else if (next === "parts_ordered") {
      fields = `
        <label for="f_parts_notes">Parts Notes (optional)</label>
        <textarea id="f_parts_notes"></textarea>
        <label for="f_parts_by">Your Name (Parts)</label>
        <input id="f_parts_by" required />
      `;
    } else if (next === "service_complete") {
      fields = `
        <label for="f_ro_value">RO Value ($)</label>
        <input id="f_ro_value" type="number" step="0.01" min="0" required />
        <label for="f_closed_by">Your Name</label>
        <input id="f_closed_by" required />
      `;
    } else if (next === "follow_up_assigned") {
      const salespeople = users.filter((u) => u.role === "salesperson");
      if (salespeople.length > 0) {
        fields = `
          <label for="f_followup_select">Assign To</label>
          <select id="f_followup_select" required style="width:100%;padding:9px 10px;border:1px solid var(--line);border-radius:3px;font-family:'Inter',sans-serif;font-size:14px;">
            <option value="">Select a salesperson…</option>
            ${salespeople.map((u) => `<option value="${escapeHtml(u.email)}" data-name="${escapeHtml(u.name)}">${escapeHtml(u.name)}</option>`).join("")}
          </select>
          <p class="sub" style="margin-top:8px">Manage this list on the <a href="users.html">Users</a> page.</p>
        `;
      } else {
        fields = `
          <label for="f_followup_assignee_name">Salesperson Name</label>
          <input id="f_followup_assignee_name" required />
          <label for="f_followup_assignee_email">Salesperson Email</label>
          <input id="f_followup_assignee_email" type="email" required />
          <p class="sub" style="margin-top:8px">Add salespeople once on the <a href="users.html">Users</a> page to turn this into a dropdown.</p>
        `;
      }
    } else if (next === "follow_up_complete") {
      fields = `
        <label for="f_followup_notes">Outcome Notes (optional)</label>
        <textarea id="f_followup_notes"></textarea>
        <label for="f_followup_completed_by">Your Name</label>
        <input id="f_followup_completed_by" required />
      `;
    }

    modal.innerHTML = `
      <h2>${ADVANCE_LABEL[lead.status]}</h2>
      <p class="sub">${escapeHtml(lead.company_name)}</p>
      ${fields}
      <div class="row">
        <button class="cancel" id="cancelBtn">Cancel</button>
        <button class="confirm" id="confirmBtn">Confirm</button>
      </div>
    `;
    overlay.style.display = "flex";

    document.getElementById("cancelBtn").onclick = () => (overlay.style.display = "none");
    document.getElementById("confirmBtn").onclick = () => submitAdvance(lead, next);
  }

  async function submitAdvance(lead, next) {
    const payload = { status: next };

    if (next === "ready_for_advisor") {
      payload.assigned_by = val("f_assigned_by");
      if (!payload.assigned_by) return;
    } else if (next === "appointment_scheduled") {
      payload.vehicle_info = val("f_vehicle_info");
      const dt = val("f_appointment_date");
      if (!payload.vehicle_info || !dt) return;
      payload.appointment_date = new Date(dt).toISOString();
      payload.advisor_notes = val("f_advisor_notes");
      payload.scheduled_by = val("f_scheduled_by");
      if (!payload.scheduled_by) return;
    } else if (next === "parts_ordered") {
      payload.parts_notes = val("f_parts_notes");
      payload.parts_by = val("f_parts_by");
      if (!payload.parts_by) return;
    } else if (next === "service_complete") {
      const roValue = val("f_ro_value");
      if (roValue === "" || Number(roValue) < 0) return;
      payload.ro_value = Number(roValue);
      payload.closed_by = val("f_closed_by");
      if (!payload.closed_by) return;
    } else if (next === "follow_up_assigned") {
      const select = document.getElementById("f_followup_select");
      if (select) {
        const opt = select.selectedOptions[0];
        payload.followup_assignee_email = select.value;
        payload.followup_assignee_name = opt ? opt.dataset.name : "";
        if (!payload.followup_assignee_email) return;
      } else {
        payload.followup_assignee_name = val("f_followup_assignee_name");
        payload.followup_assignee_email = val("f_followup_assignee_email");
        if (!payload.followup_assignee_name || !payload.followup_assignee_email) return;
      }
    } else if (next === "follow_up_complete") {
      payload.followup_notes = val("f_followup_notes");
      payload.followup_completed_by = val("f_followup_completed_by");
      if (!payload.followup_completed_by) return;
    }

    const confirmBtn = document.getElementById("confirmBtn");
    confirmBtn.disabled = true;
    confirmBtn.textContent = "Saving…";

    try {
      const res = await fetch(`${API_URL}/leads/${lead.id}`, {
        method: "PATCH",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload),
      });
      if (!res.ok) throw new Error("Update failed");
      document.getElementById("overlay").style.display = "none";
      await loadAll();
    } catch (err) {
      alert("Couldn't save that update. Please try again.");
      confirmBtn.disabled = false;
      confirmBtn.textContent = "Confirm";
    }
  }

  function val(id) {
    const el = document.getElementById(id);
    return el ? el.value.trim() : "";
  }

  function money(n) {
    return "$" + Number(n).toLocaleString(undefined, { minimumFractionDigits: 0, maximumFractionDigits: 0 });
  }

  function toDatetimeLocalValue(iso) {
    const d = new Date(iso);
    if (isNaN(d)) return "";
    const pad = (n) => String(n).padStart(2, "0");
    return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
  }

  function escapeHtml(str) {
    return String(str ?? "")
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;");
  }

  document.getElementById("refreshBtn").addEventListener("click", loadAll);
  document.getElementById("overlay").addEventListener("click", (e) => {
    if (e.target.id === "overlay") document.getElementById("overlay").style.display = "none";
  });

  loadAll();
  pollTimer = setInterval(loadAll, 30000);
</script>
</body>
</html>
